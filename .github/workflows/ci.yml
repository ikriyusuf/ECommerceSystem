name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build Product API
        run: |
          docker build \
            -f src/Services/ProductService/ProductService.API/Dockerfile \
            .

      - name: Build Basket API
        run: |
          docker build \
            -f src/Services/BasketService/BasketService.API/Dockerfile \
            .