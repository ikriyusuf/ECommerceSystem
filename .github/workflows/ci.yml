name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Build & Test
  # ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ECommerceSystem.slnx

      - name: Build solution
        run: dotnet build ECommerceSystem.slnx --no-restore --configuration Release

      - name: Run tests
        run: dotnet test ECommerceSystem.slnx --no-build --configuration Release --verbosity normal

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Build & Push Docker Images
  # Sadece main branch'e push edildiğinde çalışır
  # ─────────────────────────────────────────────────────────────
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push ProductService image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Services/ProductService/ProductService.API/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/product-api:latest
            ${{ env.IMAGE_PREFIX }}/product-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push BasketService image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Services/BasketService/BasketService.API/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/basket-api:latest
            ${{ env.IMAGE_PREFIX }}/basket-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max