name: CI Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16         # latest yerine sabit versiyon kullan
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Monster.123  # düz metin şifre koyma
          POSTGRES_DB: ECommerce_ProductDb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Install EF Tool
        run: dotnet tool install --global dotnet-ef

      - name: Restore
        run: |
          dotnet restore src/Services/ProductService/ProductService.Infrastructure/ProductService.Infrastructure.csproj
          dotnet restore src/Services/ProductService/ProductService.API/ProductService.API.csproj

      - name: Build
        run: |
          dotnet build src/Services/ProductService/ProductService.Infrastructure \
            --no-restore --configuration Release
          dotnet build src/Services/ProductService/ProductService.API \
            --no-restore --configuration Release

      - name: Get Current Migration
        id: current_migration
        run: |
          CURRENT=$(dotnet ef migrations list \
            --project src/Services/ProductService/ProductService.Infrastructure \
            --startup-project src/Services/ProductService/ProductService.API \
            --no-build 2>/dev/null | grep -v "^$" | tail -1 || echo "0")
          echo "migration=${CURRENT:-0}" >> $GITHUB_OUTPUT

      - name: Apply Migration
        id: migrate
        run: |
          dotnet ef database update \
            --project src/Services/ProductService/ProductService.Infrastructure \
            --startup-project src/Services/ProductService/ProductService.API \
            --no-build \
            --connection "${{ secrets.DB_CONNECTION_STRING }}"

      - name: Rollback on Failure
        if: failure() && steps.migrate.outcome == 'failure'
        run: |
          TARGET="${{ steps.current_migration.outputs.migration }}"
          dotnet ef database update "$TARGET" \
            --project src/Services/ProductService/ProductService.Infrastructure \
            --startup-project src/Services/ProductService/ProductService.API \
            --no-build \
            --connection "${{ secrets.DB_CONNECTION_STRING }}"

      - name: Build Product API Image
        run: |
          docker build \
            -f src/Services/ProductService/ProductService.API/Dockerfile \
            -t product-api:${{ github.sha }} \     # tag ekle
            .

      - name: Build Basket API Image
        run: |
          docker build \
            -f src/Services/BasketService/BasketService.API/Dockerfile \
            -t basket-api:${{ github.sha }} \
            .