version: '3.8'

services:

  # ─── ALTYAPI SERVİSLERİ ───────────────────────────────

  postgresql:
    image: postgres:15
    container_name: ecommerce_postgresql
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: productdb
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:4-management
    container_name: ecommerce_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: secret
    ports:
      - "5672:5672"
      - "15672:15672"

  # ─── UYGULAMA SERVİSLERİ ──────────────────────────────

  product.api:
    build:
      context: .
      dockerfile: src/Services/ProductService/ProductService.API/Dockerfile
    container_name: ecommerce_product
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgresql;Port=5432;Database=productdb;Username=admin;Password=secret
      - RabbitMQ__Host=rabbitmq
    ports:
      - "5001:8080"
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  basket.api:
    build:
      context: .
      dockerfile: src/Services/BasketService/BasketService.API/Dockerfile
    container_name: ecommerce_basket
    environment:
      - ConnectionStrings__Redis=redis:6379
      - RabbitMQ__Host=rabbitmq
    ports:
      - "5002:8080"
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

volumes:
  postgresql_data: